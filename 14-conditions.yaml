- name: gathering facts
  hosts: local
  connection: local
  
  tasks:
    - name: printing gathering facts
      ansible.builtin.debug:
        msg: "{{ansible_facts}}"

    - name: printing os RedHat
      ansible.builtin.debug:
        msg: "Kernal is RedHat"
      when: ansible_facts.os_family == "RedHat"
    
    - name: printing os Debian
      ansible.builtin.debug:
        msg: "Kernal is Debian"
      when: ansible_facts.os_family == "Debian"