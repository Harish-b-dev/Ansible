- name: Print username and password
  hosts: local
  connection: local
  vars_prompt:
    - name: username
      prompt: "Please enter your username: "
      private: false

    - name: password
      prompt: "Please enter your password: "
      private: true
  
  tasks:
    - name: printing inputs
      vars:
        name: username
        key: password
      ansible.builtin.debug:
        msg: "username is {{name}}, password is {{key}}"