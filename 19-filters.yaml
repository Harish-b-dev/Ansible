- name: Demo on filters
  hosts: local
  connection: local
  vars:
    topics: linux, shell, ansible, yaml
    course: Devops with Ansible
    myIP: 192.168.1.1
    tagsmap:
      name: Ansible
      project: Roboshop
      component: catalogue
    
    tagsitems: [
        {
            "key": "name",
            "value": "Ansible"
        },
        {
            "key": "project",
            "value": "Roboshop"
        },
        {
            "key": "component",
            "value": "catalogue"
        }
    ]


  tasks:
    - name: printing default variables with filters
      ansible.builtin.debug:
        msg: "Hi Harish, {{GREETINGS | default('Good Morning')}}"
    
    - name: printing , seperated values
      ansible.builtin.debug:
        msg: |
          "original: {{topics}}"
          "required: {{topics | split(',')}}"
    
    - name: printing dict to list of items
      ansible.builtin.debug:
        msg: "{{tagsmap | dict2items}}"
    
    - name: printing list to dict
      ansible.builtin.debug:
        msg: "{{tagsitems | items2dict}}"
    
    - name: Assigning students.yaml data to variable
      ansible.builtin.set_fact:
        student_data: "{{lookup('file', 'students.yaml') | from_yaml}}"
    
    - name: printing yaml data in json format
      ansible.builtin.debug:
        msg: "{{student_data | to_nice_json}}"
    
    - name: printing capital letters
      ansible.builtin.debug:
        msg: "{{ course | upper }}"
    
    - name: printing lower letters
      ansible.builtin.debug:
        msg: "{{ course | lower }}"
    
    - name: check IPV4 
      ansible.builtin.debug:
        msg: "{{ myIP | ansible.builtin.ipv4 }}" 
    

