- name: Demo on filters
  hosts: local
  connection: local
  vars:
    topics: linux, shell, ansible, yaml
    course: Devops with Ansible
    tagsmap:
      name: Ansible
      project: Roboshop
      component: catalogue
    
    tagsitems: [
        {
            "key": "name",
            "value": "Ansible"
        },
        {
            "key": "project",
            "value": "Roboshop"
        },
        {
            "key": "component",
            "value": "catalogue"
        }
    ]


  tasks:
    - name: printing default variables with filters
      ansible.builtin.debug:
        msg: "Hi Harish, {{GREETINGS | default('Good Morning')}}"
    
    - name: printing , seperated values
      ansible.builtin.debug:
        msg: |
          "original: {{topics}}"
          "required: {{topics | split(',')}}"
    
    - name: printing dict to list of items
      ansible.builtin.debug:
        msg: "{{tagsmap | dict2items}}"
    
    - name: printing list to dict
      ansible.builtin.debug:
        msg: "{{tagsitems | items2dict}}"