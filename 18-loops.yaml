- name: loop packages
  hosts: local
  connection: local
  become: Yes
  tasks:
    - name: installing packages
      ansible.builtin.package:
        name: "{{item.name}}"
        state: "{{item.state}}"
      loop:
      - {name: nginx, state: present}
      - {name: mysql, state: present}
      - {name: zip, state: absent}
