- name: "Shell vs command module"
  hosts: local
  connection: local
  tasks:
    - name: users data
      ansible.builtin.shell: cat /etc/passwd | grep root
      register: user_output
    
    - name: printing user data
      ansible.builtin.debug:
        msg: "{{user_output}}"
    
    - name: file data command
      ansible.builtin.command: ls -ltr
      register: files_list
    
    - name: printing file list
      ansible.builtin.debug:
        msg: "{{files_list}}"
    

    - name: file data shell
      ansible.builtin.shell: ls -ltr > files.txt
      register: files_list1
    
    - name: printing file list
      ansible.builtin.debug:
        msg: "{{files_list1}}"